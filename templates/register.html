{% extends "base.html" %}
{% block content %}
<h2>Register</h2>
<form method="post">
    First Name: <input type="text" name="first" required><br>
    Last Name: <input type="text" name="last" required><br>
    Date of Birth: <input type="date" name="dob" required><br>
    Email: <input type="email" name="email" required><br>
    Phone Number: <input type="text" name="phone" placeholder="e.g., +1234567890" required><br>
    Student ID: <input type="text" name="student_id" required><br>
    Preferred Username: <input type="text" name="username" required><br>
    Password (min 6): <input type="password" name="password" required><br>
    <button type="submit">Register</button>
</form>
{% endblock %}
