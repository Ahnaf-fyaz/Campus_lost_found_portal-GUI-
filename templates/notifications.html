{% extends "base.html" %}
{% block content %}
<h2>Your Notifications</h2>
{% if messages %}
    <ul>
    {% for msg in messages %}
        <li>{{ msg }}</li>
    {% endfor %}
    </ul>
{% else %}
    <p>No new notifications.</p>
{% endif %}
<a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
{% endblock %}
